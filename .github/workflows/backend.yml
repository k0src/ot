name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

permissions:
  contents: read
  id-token: write # required for OIDC federated auth to Azure

env:
  NODE_VERSION: "20"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace backend

      - name: Type check
        run: npm run typecheck --workspace backend

      - name: Test (with coverage)
        run: npm run test:coverage --workspace backend

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  deploy:
    name: Build & Deploy
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build & push image to ACR
        run: |
          az acr login --name "${{ vars.ACR_NAME }}"
          docker build -t "${{ vars.ACR_NAME }}.azurecr.io/oti-backend:${{ github.sha }}" \
            -f backend/Dockerfile backend
          docker push "${{ vars.ACR_NAME }}.azurecr.io/oti-backend:${{ github.sha }}"

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.BACKEND_APP_NAME }}
          images: "${{ vars.ACR_NAME }}.azurecr.io/oti-backend:${{ github.sha }}"

      - name: Run database migrations (gated)
        run: npm run prisma:migrate:deploy --workspace backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Health check
        run: |
          curl --fail --retry 5 --retry-delay 10 --retry-connrefused \
            "https://${{ vars.BACKEND_APP_NAME }}.azurewebsites.net/health"
